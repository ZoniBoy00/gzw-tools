<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>GZW Map Calibration</title>
<style>
:root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--accent:#3b82f6;--good:#22c55e;--bad:#ef4444;--text:#e6edf3;--muted:#8b949e}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
#mapPane{flex:1;overflow:auto;position:relative;background:linear-gradient(45deg,#111 25%,transparent 25%),linear-gradient(-45deg,#111 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#111 75%),linear-gradient(-45deg,transparent 75%,#111 75%);background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0}
#imgWrap{position:relative;display:inline-block}
#mapImg{display:block;user-select:none}
.pin{position:absolute;width:16px;height:16px;margin-left:-8px;margin-top:-8px;border-radius:50%;background:var(--accent);border:2px solid #fff;box-shadow:0 0 8px rgba(0,0,0,.6);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;z-index:5}
.pin.done{background:var(--good)}
#sidebar{width:360px;background:var(--panel);border-left:1px solid var(--border);padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
h1{font-size:15px;margin:0 0 2px}
.sub{color:var(--muted);font-size:12px;margin:0 0 10px}
.field{display:flex;flex-direction:column;gap:4px}
label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
input,button{background:#0d1117;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:13px}
button{background:var(--accent);border:none;cursor:pointer;font-weight:600}
button:hover{filter:brightness(1.1)}
button.secondary{background:#21262d;color:var(--text)}
#poiList{display:flex;flex-direction:column;gap:4px;max-height:260px;overflow-y:auto}
.poiRow{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:5px;font-size:12px;border:1px solid transparent}
.poiRow.active{border-color:var(--accent);background:rgba(59,130,246,0.1)}
.poiRow .dot{width:8px;height:8px;border-radius:50%;background:#444;flex-shrink:0}
.poiRow.marked .dot{background:var(--good)}
.poiRow .name{flex:1}
.poiRow .grid{color:var(--muted);font-family:monospace;font-size:11px}
.poiRow button{padding:2px 8px;font-size:11px}
#zoomRow{display:flex;gap:6px;align-items:center}
#zoomRow input[type=range]{flex:1}
#status{font-size:12px;padding:8px 10px;border-radius:6px;background:#21262d}
#status.err{background:rgba(239,68,68,.15);color:#ff8080}
#status.ok{background:rgba(34,197,94,.12);color:#7ee2a0}
pre{background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:10px;font-size:11px;overflow-x:auto;white-space:pre-wrap}
.rowbtns{display:flex;gap:8px}
.rowbtns button{flex:1}
.residual{font-family:monospace;font-size:11px;color:var(--muted)}
.residual.bad{color:var(--bad)}
</style>
</head>
<body>
<div id="mapPane"><div id="imgWrap"><img id="mapImg" draggable="false"></div></div>
<div id="sidebar">
<div><h1>GZW Map Calibration</h1><p class="sub">1. Klikkaa POI nimeä → 2. Klikkaa sen sijainti kartalta → 3. Toista kaikille → 4. Laske kalibrointi → 5. Kopioi koodi</p></div>
<div class="field">
<label>Karttakuva</label>
<input id="imgUrl" value="https://static.wikia.nocookie.net/gray-zone-warfare/images/8/8b/Lamang_Island_Full_Map_Large.png/revision/latest?cb=20260405084540">
<div class="rowbtns">
<button class="secondary" onclick="loadImage()">Lataa Wiki-kuva</button>
<button class="secondary" onclick="document.getElementById('imgUrl').value='https://oyster.ignimgs.com/mediawiki/apis.ign.com/gray-zone-warfare/2/20/Ign-gray-zone-warfare-map.PNG';loadImage()">Lataa IGN-kuva</button>
</div>
</div>
<div class="field">
<label>Zoom <span id="zoomVal">100%</span></label>
<div id="zoomRow"><input type="range" id="zoom" min="20" max="500" value="100"></div>
</div>
<div class="field">
<label>POIt</label>
<div id="poiList"></div>
<div class="rowbtns">
<button class="secondary" onclick="addCustomPoi()">+ Lisää</button>
<button class="secondary" onclick="clearAll()">Tyhjennä</button>
</div>
</div>
<div id="status">Lataa kuva ja klikkaa POI:ita.</div>
<button onclick="calibrate()">Laske kalibrointi</button>
<div id="result" style="display:none">
<div class="field"><label>Virhe (px)</label><div id="residuals"></div></div>
<div class="field"><label>Koodi</label><pre id="codeOut"></pre><button class="secondary" onclick="copyCode()">Kopioi</button></div>
</div>
</div>
<script>
let pois=[{name:"Kiu Vongsa",grid:[141,164]},{name:"Nam Thaven",grid:[171,118]},{name:"Pha Lang",grid:[202,162]},{name:"Sawmill",grid:[139,144]},{name:"Hunter's Paradise",grid:[159,168]},{name:"Ban Pa",grid:[205,137]},{name:"Pha Lang Airfield",grid:[182,158]},{name:"YBL-1",grid:[143,122]},{name:"Blue Lagoon",grid:[203,117]},{name:"Midnight Sapphire",grid:[171,166]},{name:"Fort Narith",grid:[143,129]},{name:"Tiger Bay",grid:[198,130]}].map(p=>({...p,px:null}));
let activeIdx=0,naturalW=0,naturalH=0;
const img=document.getElementById('mapImg'),imgWrap=document.getElementById('imgWrap'),mapPane=document.getElementById('mapPane'),zoom=document.getElementById('zoom'),zoomVal=document.getElementById('zoomVal'),status=document.getElementById('status');
function loadImage(){const u=document.getElementById('imgUrl').value.trim();img.onload=()=>{naturalW=img.naturalWidth;naturalH=img.naturalHeight;applyZoom();setStatus(`Ladattu ${naturalW}x${naturalH}px. Klikkaa POI ja sitten karttaa.`,'');renderPins()};img.onerror=()=>setStatus('Kuvan lataus epäonnistui','err');img.src=u}
function applyZoom(){const s=zoom.value/100;img.style.width=(naturalW*s)+'px';img.style.height=(naturalH*s)+'px';zoomVal.textContent=zoom.value+'%';renderPins()}
zoom.addEventListener('input',applyZoom);
mapPane.addEventListener('click',e=>{if(e.target!==img)return;const r=img.getBoundingClientRect(),s=zoom.value/100,px=Math.round((e.clientX-r.left)/s),py=Math.round((e.clientY-r.top)/s);pois[activeIdx].px=[px,py];renderPins();renderPoiList();const n=pois.findIndex(p=>p.px===null);if(n!==-1)activeIdx=n;renderPoiList();setStatus(`"${pois[activeIdx].name}" @ (${px},${py})${n!==-1?' -> seuraava: '+pois[n].name:': KAIKKI VALMIIT!'}`,'ok')});
function renderPins(){document.querySelectorAll('.pin').forEach(p=>p.remove());const s=zoom.value/100;pois.forEach((p,i)=>{if(!p.px)return;const pin=document.createElement('div');pin.className='pin done';pin.style.left=(p.px[0]*s)+'px';pin.style.top=(p.px[1]*s)+'px';pin.textContent=i+1;pin.onclick=ev=>{ev.stopPropagation();activeIdx=i;renderPoiList()};imgWrap.appendChild(pin)})}
function renderPoiList(){const list=document.getElementById('poiList');list.innerHTML='';pois.forEach((p,i)=>{list.innerHTML+=`<div class="poiRow${i===activeIdx?' active':''}${p.px?' marked':''}"><span class="dot"></span><span class="name">${p.name}</span><span class="grid">${p.grid[0]}:${p.grid[1]}</span><button onclick="selectPoi(${i})">${p.px?'✓':'Valitse'}</button></div>`})}
function selectPoi(i){activeIdx=i;renderPoiList()}
function addCustomPoi(){const n=prompt('Nimi:');if(!n)return;const g=prompt('Grid (X:Y):');if(!g||!g.includes(':'))return;const[x,y]=g.split(':').map(Number);pois.push({name:n,grid:[x,y],px:null});activeIdx=pois.length-1;renderPoiList()}
function clearAll(){pois.forEach(p=>p.px=null);activeIdx=0;renderPins();renderPoiList();document.getElementById('result').style.display='none';setStatus('Tyhjennetty.','')}
function setStatus(m,c){status.textContent=m;status.className=c}
function linreg(x,y){const n=x.length,sx=x.reduce((a,b)=>a+b),sy=y.reduce((a,b)=>a+b),sxy=x.reduce((a,v,i)=>a+v*y[i],0),sxx=x.reduce((a,v)=>a+v*v,0),d=n*sxx-sx*sx;if(!d)return null;const m=(n*sxy-sx*sy)/d,b=(sy-m*sx)/n;return{m,b}}
function calibrate(){const m=pois.filter(p=>p.px);if(m.length<2){setStatus('Tarvitaan 2+ pistettä.','err');return}
const gx=m.map(p=>p.grid[0]),gy=m.map(p=>p.grid[1]),px=m.map(p=>p.px[0]),py=m.map(p=>p.px[1]),rx=linreg(gx,px),ry=linreg(gy,py);if(!rx||!ry){setStatus('Kalibrointi epäonnistui','err');return}
document.getElementById('residuals').innerHTML=m.map(p=>{const px2=rx.m*p.grid[0]+rx.b,py2=ry.m*p.grid[1]+ry.b,d=Math.sqrt((px2-p.px[0])**2+(py2-p.px[1])**2);return`<div class="residual${d>15?' bad':''}">${p.name}: ${d.toFixed(1)}px</div>`}).join('');
const code=`// Kalibroitu ${m.length} pisteestä
const SCALE_X = ${rx.m.toFixed(6)};
const OFFSET_X = ${rx.b.toFixed(2)};
const SCALE_Y = ${ry.m.toFixed(6)};
const OFFSET_Y = ${ry.b.toFixed(2)};

function parseGrid(g) {
  const [x, y] = g.replace(/\\s/g, '').split(':').map(Number);
  return [SCALE_Y * y + OFFSET_Y, SCALE_X * x + OFFSET_X];
}

function pixelToGrid(lx, ly) {
  return [Math.round((lx - OFFSET_X) / SCALE_X), Math.round((ly - OFFSET_Y) / SCALE_Y)];
}`;
document.getElementById('codeOut').textContent=code;document.getElementById('result').style.display='flex';document.getElementById('result').style.flexDirection='column';document.getElementById('result').style.gap='10px';setStatus(`Kalibroitu ${m.length} pisteestä.`,'ok')}
function copyCode(){navigator.clipboard.writeText(document.getElementById('codeOut').textContent);setStatus('Kopioitu!','ok')}
renderPoiList();loadImage();
</script>
</body>
</html>
