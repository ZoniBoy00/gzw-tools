name: Sync Data from gzw-data

on:
  schedule:
    - cron: '30 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List data files from gzw-data
        id: list_files
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getContent({
              owner: 'ZoniBoy00',
              repo: 'gzw-data',
              path: 'data'
            });
            const files = data.filter(f => f.name.endsWith('.json'));
            core.setOutput('files', files.map(f => f.name).join(' '));

      - name: Download all data files
        run: |
          FILES="${{ steps.list_files.outputs.files }}"
          echo "Downloading: $FILES"
          for f in $FILES; do
            curl -sL "https://raw.githubusercontent.com/ZoniBoy00/gzw-data/main/data/$f" -o "src/data/$f" &
          done
          wait
          echo "Done downloading all files."

      - name: Normalise data
        run: |
          python3 scripts/normalise_data.py 2>&1 || true
          python3 scripts/reorder_data.py 2>&1 || true

      - name: Commit
        run: |
          git config user.name "gzw-bot"
          git config user.email "bot@gzw-tools.dev"
          if git status --porcelain src/data/ | grep -q .; then
            git add src/data/
            git commit -m "auto: sync data from gzw-data ($(date +%Y-%m-%d))"
            git push
          else
            echo "No changes."
          fi
