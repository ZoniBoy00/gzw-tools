name: Weekly Data Scrape
on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:       # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 2>/dev/null || true
      - name: Run scraper
        run: python scripts/scraper/scrape.py 2>&1 || echo "No scraper found — skipping"
      - name: Check for changes
        id: changed
        run: |
          if [[ -n "$(git status --porcelain scripts/)" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Create PR
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config user.name "gzw-bot"
          git config user.email "bot@gzw-tools.dev"
          BRANCH="data/update-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "auto: update scraped data $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create --fill --base main --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
