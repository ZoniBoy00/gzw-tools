name: Weekly Data Scrape
on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml 2>&1 | tail -5

      # ── Step 1: Scrape all categories from wiki ──
      - name: Run scraper (weapons, armor, tasks, attachments, throwables, keys, images)
        run: |
          cd scripts/scraper
          python scrape.py --all 2>&1
        continue-on-error: true

      # ── Step 2: Enrich tasks with objectives/rewards and find ALL tasks ──
      - name: Enrich task data
        run: |
          cd scripts/scraper
          python enrich_tasks.py 2>&1
        continue-on-error: true

      # ── Step 3: Categorize tasks (main/side/hidden/contract/squad) ──
      - name: Categorize tasks
        run: |
          cd scripts/scraper
          python categorize_tasks.py 2>&1
        continue-on-error: true

      # ── Step 4: Generate frontend data files ──
      - name: Generate frontend data
        run: |
          cd scripts/scraper
          python gen_frontend_data.py 2>&1

      # ── Step 5: Copy all data to frontend ──
      - name: Copy data to frontend
        run: |
          cp scripts/scraper/data/tasks.json src/data/tasks.json
          cp scripts/scraper/data/weapons.json src/data/weapons.json
          cp scripts/scraper/data/item_images.json src/data/item_images.json 2>/dev/null || echo "No item_images.json to copy"
          cp scripts/scraper/data/throwables.json src/data/throwables.json 2>/dev/null || echo "No throwables.json to copy"
          cp scripts/scraper/data/keys.json src/data/keys.json 2>/dev/null || echo "No keys.json to copy"
          cp scripts/scraper/data/keycards.json src/data/keycards.json 2>/dev/null || echo "No keycards.json to copy"
          echo "✅ Copied data files to src/data/"

      # ── Step 6: Check for data changes ──
      - name: Check for data changes
        id: changed
        run: |
          declare -a FILES=(
            "src/data/tasks.json"
            "src/data/weapons.json"
            "src/data/armor.json"
            "src/data/keys.json"
            "src/data/ammo.json"
            "src/data/item_images.json"
            "src/data/throwables.json"
          )
          CHANGED=false
          for f in "${FILES[@]}"; do
            if git status --porcelain "$f" 2>/dev/null | grep -q .; then
              echo "  Changed: $f"
              CHANGED=true
            fi
          done
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          if $CHANGED; then
            echo "Data files changed — opening PR."
          else
            echo "No data changes detected."
          fi

      # ── Step 7: Create PR if data changed ──
      - name: Create Pull Request with updated data
        if: steps.changed.outputs.changed == 'true'
        run: |
          BRANCH="data/update-$(date +%Y%m%d)"
          git config user.name "gzw-bot"
          git config user.email "bot@gzw-tools.dev"
          git checkout -b "$BRANCH"
          git add scripts/scraper/data/ src/data/
          git commit -m "auto: update scraped data ($(date +%Y-%m-%d))"
          git push origin "$BRANCH"
          gh pr create \
            --title "Auto: Data update $(date +%Y-%m-%d)" \
            --body "Automated weekly wiki scrape updated:
            - Weapons (\`weapons.json\`)
            - Armor (\`armor.json\`)
            - Ammo with penetration data (\`ammo.json\`)
            - Tasks/missions (\`tasks.json\`) — all categories scraped
            - Task objectives, rewards, categories
            - Keys/Keycards (\`keys.json\`)
            - Throwables/Grenades (\`throwables.json\`)
            - Item images (\`item_images.json\`)

            Review changes before merging to main." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
